name: Build installers

# Triggers:
#   - Push a tag starting with "v" (e.g. "v0.1.0") → builds + creates a
#     GitHub Release with the artifacts attached.
#   - Manually via the Actions tab → builds without a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # macOS: compile Swift helper, package universal-arch zips.
  # ─────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Swift helper (ScreenCaptureKit audio tap)
        run: |
          cd native/mac
          swift build -c release --arch arm64 --arch x86_64
          # When building multi-arch, SwiftPM puts the universal binary in
          # .build/apple/Products/Release (not .build/release which is the
          # single-arch path). Copy to a predictable location for
          # scripts/build-mac.ts to find.
          mkdir -p .build/release
          cp .build/apple/Products/Release/audiotap .build/release/audiotap
          chmod +x .build/release/audiotap
          ls -la .build/release
          file .build/release/audiotap

      - name: Build macOS zips (arm64 + x64)
        env:
          MAC_ARCH: both
        run: pnpm dist:mac

      - name: List release artifacts
        run: ls -la release/0.1.0/

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/0.1.0/*.zip
            release/0.1.0/*.txt

  # ─────────────────────────────────────────────────────────────
  # Windows: build NSIS installer.
  # ─────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows NSIS installer
        run: pnpm dist:win

      - name: List release artifacts
        shell: bash
        run: ls -la release/0.1.0/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/0.1.0/InterviewCopilot-Setup-*.exe

  # ─────────────────────────────────────────────────────────────
  # Release: attach artifacts from both builds when a tag is pushed.
  # ─────────────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-builds
          path: artifacts/mac
      - uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: artifacts/win
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.zip
            artifacts/mac/*.txt
            artifacts/win/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
